hostname SimpleRouter
!
interface GigabitEthernet0/0
 ip address 192.168.1.1 255.255.255.0
  yes shutdown
!
interface GigabitEthernet0/1
 ip address 10.10.0.1 255.255.255.0
 shutdown
!
ip route 10.0.0.0 10.0.0.0 10.0.0.254
!
username whoami admin privilege 15 secret AdminPass123
!
line vty 0 4
 login local
 transport input ssh
!
end
terraform
kubernetes
docker

